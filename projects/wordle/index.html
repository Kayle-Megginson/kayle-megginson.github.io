<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>Wordle Game</title>
    <style>
        html, body {
            margin: 0;
            background: #050d18;
            color: #f4f8ff;
        }
    </style>
    <link rel="stylesheet" href="../../subpage-theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page-type="app" data-back-link="../../index.html" data-page-title="Wordle" data-page-description="A polished browser-based Wordle clone that showcases front-end logic, game-state handling, and responsive interaction design.">
    <div id="game">
        <canvas id="gameCanvas"></canvas>
        <div id="keyboard"></div>
        <div id="controls">

                    onclick="window.location.href='https://kayle-megginson.github.io/'">

            </button> 
        </div>
    </div>
    <script src="game.js"></script>
    <script src="../../subpage-theme.js"></script>
